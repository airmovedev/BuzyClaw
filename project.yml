name: ClawTower
options:
  bundleIdPrefix: com.clawtower
  deploymentTarget:
    macOS: "14.0"
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  ClawTower:
    type: application
    platform: macOS
    sources:
      - Sources/ClawTower
      - path: Sources/ClawTowerMobile/Models/DashboardSnapshot.swift
        type: file
      - path: Resources
        type: folder
        buildPhase: resources
      - path: SupportFiles/Localization
        buildPhase: resources
    resources:
      - path: Sources/ClawTower/Resources/Assets.xcassets
    info:
      path: SupportFiles/Info.plist
      properties:
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleDisplayName: "虾忙"
        LSHasLocalizedDisplayName: true
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSCameraUsageDescription: "虾忙需要访问摄像头，以便 AI 通过视觉获取信息来帮助你完成任务"
        NSMicrophoneUsageDescription: "虾忙需要访问麦克风，以便 AI 听取你的语音指令"
        NSCalendarsFullAccessUsageDescription: "虾忙需要访问日历，以便 AI 查看和管理你的日程安排"
        NSRemindersFullAccessUsageDescription: "虾忙需要访问提醒事项，以便 AI 帮你创建和管理待办事项"
    entitlements:
      path: SupportFiles/ClawTower.entitlements
      properties:
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.clawtower.app
        com.apple.developer.icloud-container-environment: Production
        com.apple.security.network.client: true
    preBuildScripts:
      - name: Prepare OpenClaw Runtime
        script: |
          "$SRCROOT/Scripts/prepare-runtime.sh"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clawtower.app
        PRODUCT_NAME: BuzyClaw
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: USYB32X4N8
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: true
    dependencies:
      - package: Sparkle
        product: Sparkle
      - package: MarkdownUI

  ClawTowerMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources/ClawTowerMobile
        type: group
      - path: Sources/ClawTower/Services/CloudKit/MessageRecord.swift
        type: file
      - path: Sources/ClawTower/Models/CronJob.swift
        type: file
      - path: Sources/ClawTower/Services/ThemeManager.swift
        type: file
      - path: SupportFiles/Localization
        buildPhase: resources
    resources:
      - path: Sources/ClawTowerMobile/Resources/Assets.xcassets
      - path: Sources/ClawTowerMobile/Resources/WhisperKitModels
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: airgo.buzyclaw.com
        INFOPLIST_FILE: SupportFiles/MobileInfo.plist
        CODE_SIGN_ENTITLEMENTS: SupportFiles/ClawTowerMobile.entitlements
        PRODUCT_NAME: BuzyClaw
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: true
        DEVELOPMENT_TEAM: USYB32X4N8
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: MarkdownUI
      - package: WhisperKit
        product: WhisperKit

schemes:
  BuzyClaw_mac:
    build:
      targets:
        ClawTower: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  BuzyClaw_phone:
    build:
      targets:
        ClawTowerMobile: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.0.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
